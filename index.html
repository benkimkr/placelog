<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>킁킁로그</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 안개지도 캔버스 -->
  <canvas id="fog-canvas" class="fog-canvas hidden"></canvas>

  <!-- 헤더 HUD -->
  <header class="hud-header">
    <div class="logo-pill">
      <span class="logo">킁킁로그</span>
    </div>
    <div class="hud-right">
      <div class="pin-badge" id="pin-badge">0 곳</div>
      <div class="profile-wrap" id="profile-wrap">
        <button class="user-avatar hidden" id="user-avatar" onclick="toggleProfileMenu()"></button>
        <div class="profile-menu hidden" id="profile-menu">
          <div class="pm-profile">
            <div class="pm-avatar" id="pm-avatar"></div>
            <div class="pm-info">
              <span class="pm-name" id="pm-name"></span>
              <span class="pm-count" id="pm-count">기록한 장소 0곳</span>
            </div>
          </div>
          <div class="pm-divider"></div>
          <button class="pm-logout" onclick="logout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            로그아웃
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 검색바 -->
  <div class="search-wrap" id="search-wrap">
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="search" id="search-input" placeholder="산책 장소 검색..."
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-sc hidden" id="btn-sc" onclick="clearSearch()">✕</button>
    </div>
    <ul class="search-drop hidden" id="search-drop"></ul>
  </div>

  <!-- 추가 모드 배너 -->
  <div class="add-banner hidden" id="add-banner">
    <span>🐾 지도를 탭해서 핀을 꽂아주세요</span>
    <button onclick="cancelAddMode()">취소</button>
  </div>

  <!-- FAB -->
  <button class="btn-fab" id="btn-fab" onclick="onFabClick()">
    <svg id="fab-plus" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
    </svg>
    <svg id="fab-x" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </button>

  <!-- 안개지도 토글 -->
  <button class="btn-fog hidden" id="btn-fog" onclick="toggleFog()" title="안개지도">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 8h2v2H3zm0 4h2v2H3zm0 4h2v2H3zm16-8h2v2h-2zm0 4h2v2h-2zm0 4h2v2h-2zM7 8h10v2H7zm0 4h10v2H7zm0 4h10v2H7z"/>
    </svg>
  </button>

  <!-- 안개지도 탐색 통계 -->
  <div class="fog-stats-pill hidden" id="fog-stats-pill">
    <span id="fog-stats"></span>
  </div>

  <!-- 내 위치 -->
  <button class="btn-myloc" onclick="goMyLocation()" title="내 위치">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
    </svg>
  </button>

  <!-- 줌 컨트롤 -->
  <div class="zoom-ctrl">
    <button class="btn-zoom" id="btn-zoomin">+</button>
    <button class="btn-zoom" id="btn-zoomout">−</button>
  </div>

  <!-- 바텀시트 -->
  <div class="sheet" id="sheet">
    <div class="sheet-drag" id="sheet-drag">
      <div class="sheet-handle"></div>
    </div>

    <!-- 보기 패널 -->
    <div class="s-panel" id="p-view">
      <div class="sv-toprow">
        <div>
          <div class="sv-cat" id="sv-cat"></div>
          <h2 class="sv-name" id="sv-name"></h2>
          <p class="sv-addr" id="sv-addr"></p>
        </div>
        <button class="btn-sx" onclick="closeSheet()">✕</button>
      </div>
      <div class="sv-media" id="sv-media"></div>
      <div class="sv-meta">
        <span class="sv-date" id="sv-date"></span>
        <p class="sv-memo" id="sv-memo"></p>
      </div>
      <div class="sv-btns">
        <a class="sv-btn" id="sv-maplink" href="#" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
          구글맵
        </a>
        <button class="sv-btn" onclick="shareActive()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
          공유
        </button>
        <button class="sv-btn sv-del" onclick="deleteActive()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          삭제
        </button>
      </div>
    </div>

    <!-- 추가 패널 -->
    <div class="s-panel hidden" id="p-add">
      <div class="sa-toprow">
        <h3>새 산책 기록 🐾</h3>
        <button class="btn-sx" onclick="cancelAdd()">✕</button>
      </div>

      <input class="s-inp" type="text" id="add-name" placeholder="산책 장소 이름을 입력하세요" autocomplete="off" />
      <p class="add-addr-hint" id="add-addr"></p>

      <!-- 카테고리 -->
      <div class="cat-pills" id="cat-pills"></div>

      <!-- 영상 탭 -->
      <div class="s-tabs">
        <button class="s-tab active" data-stab="yt" onclick="switchAddTab('yt')">YouTube</button>
        <button class="s-tab" data-stab="file" onclick="switchAddTab('file')">파일 업로드</button>
        <button class="s-tab" data-stab="cam" onclick="switchAddTab('cam')">카메라 촬영</button>
      </div>

      <div class="s-tabp" id="sp-yt">
        <input class="s-inp" type="text" id="add-yt" placeholder="YouTube URL 붙여넣기..." autocomplete="off" />
        <div class="s-mprev" id="yt-prev"></div>
      </div>

      <div class="s-tabp hidden" id="sp-file">
        <div class="s-upzone" id="s-upzone">
          <input type="file" id="file-inp" accept="video/*" hidden />
          <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--tmut)"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          <p>클릭 또는 드래그해서 업로드</p>
          <span class="hint">MP4 · MOV · WebM · 200MB 이하</span>
        </div>
        <div class="s-mprev" id="file-prev"></div>
      </div>

      <div class="s-tabp hidden" id="sp-cam">
        <input type="file" id="cam-inp" accept="video/*" capture="environment" hidden />
        <button class="btn-cam" onclick="document.getElementById('cam-inp').click()">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12.5c0 1.38-1.12 2.5-2.5 2.5S7 13.88 7 12.5 8.12 10 9.5 10s2.5 1.12 2.5 2.5zm9-6.5h-3.17L16 4H8L6.17 6H3C1.9 6 1 6.9 1 8v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-3 7c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6 6 2.69 6 6z"/></svg>
          후면 카메라로 촬영
        </button>
        <div class="s-mprev" id="cam-prev"></div>
      </div>

      <!-- 컬렉션 선택 -->
      <select class="s-inp s-sel" id="add-collection">
        <option value="">개인 기록</option>
      </select>

      <!-- 날짜 · 메모 -->
      <input class="s-inp" type="date" id="add-date" />
      <textarea class="s-inp s-ta" id="add-memo" placeholder="메모 (선택)"></textarea>

      <div class="sa-btns">
        <button class="btn-cancel" onclick="cancelAdd()">취소</button>
        <button class="btn-save" id="btn-save" onclick="saveCard()">저장하기 🐾</button>
      </div>
    </div>
  </div>

  <!-- 피드 뷰 -->
  <div class="feed-view hidden" id="feed-view">
    <div class="region-chips" id="region-chips"></div>
    <div class="feed-list"    id="feed-list"></div>
  </div>

  <!-- 컬렉션 뷰 -->
  <div class="coll-view hidden" id="coll-view">
    <div class="coll-topbar">
      <h2 class="coll-title">컬렉션</h2>
      <button class="btn-coll-new" onclick="showCreateCollection()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        새 컬렉션
      </button>
    </div>
    <div class="coll-list" id="coll-list"></div>
  </div>

  <!-- 경로 뷰 -->
  <div class="route-view hidden" id="route-view">
    <!-- 기록 중 HUD -->
    <div class="rv-recording-hud hidden" id="rv-recording">
      <div class="rv-rec-dot"></div>
      <div class="rv-stats">
        <div class="rv-stat">
          <span class="rv-stat-val" id="rv-time">00:00</span>
          <span class="rv-stat-lbl">시간</span>
        </div>
        <div class="rv-stat-sep">·</div>
        <div class="rv-stat">
          <span class="rv-stat-val" id="rv-dist">0.00</span>
          <span class="rv-stat-lbl">km</span>
        </div>
      </div>
      <button class="btn-stop-route" onclick="stopRoute()">종료</button>
    </div>

    <!-- 경로 시작 -->
    <div class="rv-start" id="rv-idle">
      <button class="btn-start-route" onclick="startRoute()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        경로 기록 시작
      </button>
      <p class="rv-hint">GPS로 산책 경로를 기록하고<br>지도 위에서 확인해요</p>
    </div>

    <div class="rv-divider">기록된 경로</div>
    <div class="rv-list" id="rv-list"></div>
  </div>

  <!-- 탭 바 -->
  <nav class="tab-bar">
    <button class="tab-btn active" id="tab-map" onclick="switchTab('map')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
      </svg>
      <span>지도</span>
    </button>
    <button class="tab-btn" id="tab-feed" onclick="switchTab('feed')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
      </svg>
      <span>피드</span>
    </button>
    <button class="tab-btn" id="tab-coll" onclick="switchTab('collections')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
      </svg>
      <span>컬렉션</span>
    </button>
    <button class="tab-btn" id="tab-route" onclick="switchTab('route')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7z"/>
      </svg>
      <span>경로</span>
    </button>
  </nav>

  <!-- 토스트 -->
  <div class="toast hidden" id="toast"></div>

  <!-- 새 컬렉션 모달 -->
  <div class="modal-overlay hidden" id="create-coll-modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>새 컬렉션</h3>
        <button class="btn-sx" onclick="closeCreateCollection()">✕</button>
      </div>
      <input class="s-inp" id="coll-name-inp" type="text" placeholder="예: 도쿄 여행, 고양 맛집" autocomplete="off" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeCreateCollection()">취소</button>
        <button class="btn-save" onclick="saveCollection()">만들기</button>
      </div>
    </div>
  </div>

  <!-- 초대 수락 모달 -->
  <div class="modal-overlay hidden" id="invite-modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>컬렉션 초대</h3>
      </div>
      <p class="invite-msg" id="invite-msg"></p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="declineInvite()">거절</button>
        <button class="btn-save" id="btn-accept-invite" onclick="acceptInvite()">참여하기</button>
      </div>
    </div>
  </div>

  <!-- 로그인 화면 -->
  <div class="login-screen hidden" id="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-logo">킁킁로그</span>
        <p class="login-sub">우리 강아지 산책 기록</p>
      </div>
      <button class="btn-kakao" id="btn-kakao" onclick="loginWithKakao()">
        <svg width="20" height="18" viewBox="0 0 20 18" fill="currentColor">
          <path d="M10 0C4.48 0 0 3.36 0 7.5c0 2.65 1.68 4.98 4.24 6.43L3.26 17.5l4.5-2.3c.73.14 1.47.21 2.24.21 5.52 0 10-3.36 10-7.5S15.52 0 10 0z"/>
        </svg>
        카카오로 시작하기
      </button>
      <p class="login-popup-hint" id="login-popup-hint"></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a0a94073377626348a12a0473d152c0c&libraries=services"></script>
  <script src="script.js"></script>
</body>
</html>
